version: '3.8'
services:
  db:
    image: timescale/timescaledb:latest-pg16
    container_name: climat_db
    environment:
      POSTGRES_USER: climat
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: climat_monitor
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U climat -d climat_monitor"]
      interval: 5s
      timeout: 5s
      retries: 5
  web:
    build: .
    container_name: climat_web
    ports:
      - "5002:5002"
    depends_on:
      db:
         condition: service_healthy
    volumes:
      - ./backend:/backend
      - ./frontend:/frontend
    env_file:
      - ./backend/.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5002/api/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped
volumes:
  pgdata:
